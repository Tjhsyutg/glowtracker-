<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowTracker - Smart AI Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root {
            --primary: #6c5ce7;
            --safe: #00b894;
            --warn: #fdcb6e;
            --danger: #d63031;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            /* මුළු පේජ් එකටම background එක මෙතනින් සකසනවා */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('img.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            color: #333;
        }

        .hero-header {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .app-container { max-width: 600px; margin: 0 auto 50px; padding: 0 15px; }

        .card-box { 
            background: rgba(255, 255, 255, 0.95); /* කාඩ් එක පිටුපස පින්තූරය පේන්න පොඩ්ඩක් විනිවිද පෙනෙන ලෙස */
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            margin-bottom: 20px; 
        }

        h3 { margin-top: 0; font-size: 1.1rem; color: #333; }
        textarea, select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
        
        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; 
            font-weight: 600; font-size: 1rem; margin-top: 10px; transition: 0.3s;
        }
        .btn-ai { background: var(--safe); color: white; }
        .btn-cam { background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { background: var(--primary); color: white; }

        #aiReport { 
            display: none; margin-top: 15px; padding: 15px; background: #f0fff4; 
            border-radius: 10px; border: 1px dashed var(--safe); font-size: 0.9rem; line-height: 1.5;
        }
        
        .product-item { 
            background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; 
            border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

    <header class="hero-header">
        <div>
            <h1><i class="fas fa-sparkles"></i> GlowTracker AI</h1>
            <p>Smart Skincare Assistant</p>
        </div>
    </header>

    <div class="app-container">
        <section class="card-box">
            <h3><i class="fas fa-user-circle"></i> Your Skin Type</h3>
            <select id="userSkinType">
                <option value="Oily">Oily Skin (තෙල් සහිත සම)</option>
                <option value="Dry">Dry Skin (වියළි සම)</option>
                <option value="Sensitive">Sensitive Skin (සංවේදී සම)</option>
                <option value="Combination">Combination Skin (මිශ්‍ර සම)</option>
            </select>
        </section>

        <section class="card-box" style="border-left: 5px solid var(--safe);">
            <h3><i class="fas fa-microscope"></i> AI Ingredient Checker</h3>
            
            <label for="camInput" class="btn btn-cam">
                <i class="fas fa-camera"></i> Scan Ingredients Photo
            </label>
            <input type="file" id="camInput" accept="image/*" capture="environment" style="display:none;" onchange="scanImage(this)">

            <textarea id="manualIngredients" rows="3" placeholder="Paste or scan ingredients here..." style="margin-top:10px;"></textarea>
            
            <button id="aiBtn" class="btn btn-ai">
                <i class="fas fa-robot"></i> Analyze with AI ✨
            </button>

            <div id="aiReport">
                <p id="aiReportText"></p>
            </div>
        </section>

        <section class="card-box">
            <h3><i class="fas fa-plus"></i> Add New Product</h3>
            <input type="text" id="productName" placeholder="Product Name" style="margin-bottom:10px;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <select id="category">
                    <option value="face">Face Care</option>
                    <option value="body">Body Care</option>
                    <option value="hair">Hair Care</option>
                    <option value="makeup">Makeup</option>
                </select>
                <input type="date" id="startDate">
            </div>
            <button id="addBtn" class="btn btn-save">Save Product</button>
        </section>

        <div id="productContainer"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCCEt4Bv_vYzdsuMPrNpUHv8699jHZvF2g",
            authDomain: "glowtracker-app.firebaseapp.com",
            projectId: "glowtracker-app",
            storageBucket: "glowtracker-app.firebasestorage.app",
            messagingSenderId: "460233876580",
            appId: "1:460233876580:web:9b19a5e33b7e8216e2eb71"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GEMINI_API_KEY = "AIzaSyAHvOCkqn1PYIGcopR7G4QSW2Ywn9_M45E";

        // 1. Camera Scan (OCR)
        window.scanImage = async (input) => {
            const file = input.files[0];
            if (!file) return;
            const reportBox = document.getElementById('aiReport');
            const reportText = document.getElementById('aiReportText');
            reportBox.style.display = 'block';
            reportText.innerText = "Scanning photo... 📷";

            try {
                const result = await Tesseract.recognize(file, 'eng');
                document.getElementById('manualIngredients').value = result.data.text;
                reportText.innerText = "Scan Complete! Click 'Analyze with AI'.";
            } catch (e) { 
                reportText.innerText = "Scan failed. Please try a clearer photo."; 
            }
        };

        // 2. AI Analysis
        document.getElementById('aiBtn').onclick = async () => {
            const ing = document.getElementById('manualIngredients').value;
            const skin = document.getElementById('userSkinType').value;
            const reportBox = document.getElementById('aiReport');
            const reportText = document.getElementById('aiReportText');

            if (!ing) return alert("Please add ingredients!");
            reportBox.style.display = 'block';
            reportText.innerText = "AI is analyzing for " + skin + " skin... 🔍";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `I have ${skin} skin. Analyze these ingredients: "${ing}". Is it safe? Highlight harmful ones and give 3 tips.` }] }]
                    })
                });
                const data = await response.json();
                if (data.error) {
                    reportText.innerText = "API Error: " + data.error.message;
                } else {
                    reportText.innerText = data.candidates[0].content.parts[0].text;
                }
            } catch (e) { 
                reportText.innerText = "Connection error. Check your API Key.";
            }
        };

        // 3. Firebase Save
        document.getElementById('addBtn').onclick = async () => {
            const name = document.getElementById('productName').value;
            const startDate = document.getElementById('startDate').value;
            const category = document.getElementById('category').value;
            if (name && startDate) {
                await addDoc(collection(db, "products"), { name, startDate, category, createdAt: new Date() });
                document.getElementById('productName').value = "";
                alert("Product Saved!");
            } else {
                alert("Please fill all details!");
            }
        };

        // Real-time List
        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('productContainer');
            container.innerHTML = "<h3 style='color:white;'>Your Products</h3>";
            snap.forEach(d => {
                const p = d.data();
                container.innerHTML += `<div class="product-item"><b>${p.name}</b> (${p.category})<br><small>Started: ${p.startDate}</small></div>`;
            });
        });
    </script>
</body>
</html>
