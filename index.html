<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="GlowTracker">
<link rel="apple-touch-icon" href="img.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowTracker - Smart AI Skincare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <header class="hero-header">
            <div class="overlay">
                <h1><i class="fas fa-sparkles"></i> GlowTracker AI</h1>
                <p>Track your timeline & analyze ingredients with AI.</p>
            </div>
        </header>

        <div class="app-container">
            <section class="card-box">
                <h3><i class="fas fa-user-circle"></i> Your Skin Type</h3>
                <select id="userSkinType">
                    <option value="Oily">Oily Skin (තෙල් සහිත සම)</option>
                    <option value="Dry">Dry Skin (වියළි සම)</option>
                    <option value="Sensitive">Sensitive Skin (සංවේදී සම)</option>
                    <option value="Combination">Combination Skin (මිශ්‍ර සම)</option>
                </select>
            </section>

            <section class="card-box ai-card" style="border-left: 5px solid #00b894;">
                <h3><i class="fas fa-microscope"></i> AI Ingredient Checker</h3>
                <textarea id="manualIngredients" rows="3" placeholder="Paste ingredients list here..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
                <button id="aiBtn" style="width:100%; background:#00b894; color:white; padding:12px; border:none; border-radius:10px; margin-top:10px; cursor:pointer; font-weight:bold;">
                    <i class="fas fa-robot"></i> Analyze with AI ✨
                </button>
                <div id="aiReport" style="display:none; margin-top:15px; padding:15px; background:#f0fff4; border-radius:10px; border:1px dashed #00b894;">
                    <p id="aiReportText" style="font-size:0.9rem; line-height:1.5;"></p>
                </div>
            </section>

            <section class="input-section card-box">
                <h3><i class="fas fa-plus"></i> Add New Product</h3>
                <div class="form-row">
                    <input type="text" id="productName" placeholder="Product Name (e.g. Nivea Serum)">
                    <select id="category">
                        <option value="face">Face Care</option>
                        <option value="body">Body Care</option>
                        <option value="hair">Hair Care</option>
                        <option value="makeup">Makeup</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="date" id="startDate">
                    <button id="addBtn"><i class="fas fa-plus"></i> Save Product</button>
                </div>
            </section>

            <section class="controls card-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search your inventory...">
            </section>

            <div id="productContainer" class="grid-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration (Based on your screenshots)
        const firebaseConfig = {
            apiKey: "AIzaSyCCEt4Bv_vYzdsuMPrNpUHv8699jHZvF2g",
            authDomain: "glowtracker-app.firebaseapp.com",
            projectId: "glowtracker-app",
            storageBucket: "glowtracker-app.firebasestorage.app",
            messagingSenderId: "460233876580",
            appId: "1:460233876580:web:9b19a5e33b7e8216e2eb71",
            measurementId: "G-LYW4Q2VBQV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GEMINI API KEY එක මෙතනට පේස්ට් කරන්න ---
        const GEMINI_API_KEY = "AIzaSyATdSWnbLecOzYjj2nN5ka9h_RcMuhE2Is"; 

        // AI Logic
        document.getElementById('aiBtn').onclick = async () => {
            const ing = document.getElementById('manualIngredients').value;
            const skin = document.getElementById('userSkinType').value;
            const reportText = document.getElementById('aiReportText');
            const reportBox = document.getElementById('aiReport');

            if (!ing) return alert("අමුද්‍රව්‍ය ලැයිස්තුව ඇතුළත් කරන්න!");
            reportBox.style.display = 'block';
            reportText.innerText = "AI Analysis in progress... 🔍";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `User has ${skin} skin. Analyze these ingredients for safety: "${ing}". List bad chemicals if any and give a short advice.` }] }]
                    })
                });
                const data = await response.json();
                reportText.innerHTML = `<strong>AI Result:</strong><br>${data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>')}`;
            } catch (e) { reportText.innerText = "AI error. Check your API key!"; }
        };

        // Firebase Add Product
        window.addProduct = async () => {
            const name = document.getElementById('productName').value;
            const date = document.getElementById('startDate').value;
            const cat = document.getElementById('category').value;
            if (name && date) {
                await addDoc(collection(db, "products"), { name, startDate: date, category: cat, createdAt: new Date() });
                document.getElementById('productName').value = "";
            }
        };

        // Real-time List Listener
        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('productContainer');
            container.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                container.innerHTML += `<div class="card-box"><h4>${p.name}</h4><p>Started: ${p.startDate}</p></div>`;
            });
        });

        document.getElementById('addBtn').onclick = window.addProduct;
    </script>
</body>
</html>
